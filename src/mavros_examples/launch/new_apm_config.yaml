# =============================================================================
# new_apm_config.yaml
#
# Purpose:
#   Minimal MAVROS ROS 2 config for:
#   - ArduPilot (Cube Orange+)
#   - MAVROS on ROS 2
#   - External pose coming from a ROS 2 visual estimator
#   - GUIDED mode / local navigation without GPS
#
# Important:
#   This file configures MAVROS behavior only.
#   It does NOT configure the ArduPilot EKF source selection.
#   EKF3 / ExternalNav / no-GPS settings must still be set on the flight
#   controller in QGroundControl or Mission Planner.
#
# Design choice:
#   Keep only the sections that matter for:
#   - heartbeat/system health
#   - time sync
#   - local position output
#   - incoming external vision pose
#   - outgoing local setpoints
# =============================================================================


# -----------------------------------------------------------------------------
# /mavros/sys
#
# "sys" = system / heartbeat / diagnostics plugin parameters.
#
# Why keep this:
#   MAVROS sends a heartbeat to the FCU and also monitors connection health.
#   This section is useful even in a minimal config.
#
# Notes:
#   - min_voltage only affects MAVROS diagnostics/warnings, not flight control.
#   - heartbeat_mav_type tells ArduPilot what kind of MAVLink companion this is.
#   - conn_timeout controls how long MAVROS waits before considering the FCU
#     disconnected.
# -----------------------------------------------------------------------------
/mavros/sys:
  ros__parameters:
    # Diagnostic minimum battery voltage threshold seen by MAVROS.
    # This is only for diagnostics on the ROS side.
    # Adjust if you want cleaner warnings for your battery pack.
    min_voltage: [10.0]

    # If true, disable most sys_status diagnostics.
    # Leave false while debugging.
    disable_diag: false

    # MAVROS heartbeat send rate [Hz].
    heartbeat_rate: 1.0

    # MAV type reported by MAVROS to the flight controller.
    # The default apm config uses ONBOARD_CONTROLLER, which is appropriate
    # for a Jetson companion computer.
    heartbeat_mav_type: "ONBOARD_CONTROLLER"

    # Timeout in seconds before MAVROS reports FCU connection timeout.
    conn_timeout: 10.0


# -----------------------------------------------------------------------------
# /mavros/time
#
# Time synchronization behavior.
#
# Why keep this:
#   MAVROS and ArduPilot exchange time information. For logging, timing, and
#   some estimator integrations, consistent timestamps are helpful.
#
# Notes:
#   - The current default apm config uses MAVLINK time sync.
#   - If you later suspect timesync is causing issues, this is one of the first
#     sections to inspect.
# -----------------------------------------------------------------------------
/mavros/time:
  ros__parameters:
    # Source used for /time_reference messages.
    # "fcu" means use the flight controller time as the reference source.
    time_ref_source: "fcu"

    # Time sync method. The default apm config uses MAVLINK.
    timesync_mode: MAVLINK

    # Averaging factor for timesync filter.
    timesync_avg_alpha: 0.6

    # TIMESYNC request rate [Hz].
    # Default apm config uses 10.0 Hz.
    # You can leave this as-is unless you have a reason to reduce traffic.
    timesync_rate: 10.0

    # SYSTEM_TIME send rate [Hz].
    system_time_rate: 1.0


# -----------------------------------------------------------------------------
# /mavros/local_position
#
# Local position reported by MAVROS from FCU estimates.
#
# Why keep this:
#   Useful for seeing what ArduPilot thinks the vehicle pose is after fusing
#   your external vision input.
#
# Notes:
#   - tf.send false avoids broadcasting TF unless you specifically want it.
#   - frame_id "map" and child "base_link" are conventional and align well with
#     most ROS navigation stacks.
# -----------------------------------------------------------------------------
/mavros/local_position:
  ros__parameters:
    # Frame name for local position messages published by MAVROS.
    frame_id: "map"

    # Whether MAVROS should publish a TF transform for local position.
    # Keep false unless you intentionally want MAVROS to own this transform.
    tf.send: false

    # TF parent and child names if tf.send is turned on.
    tf.frame_id: "map"
    tf.child_frame_id: "base_link"

    # Whether to also publish FCU frame TF.
    tf.send_fcu: false


# -----------------------------------------------------------------------------
# /mavros/vision_pose
#
# This is the key section for your setup.
#
# Purpose:
#   Receives external pose from ROS and forwards it to the FCU as vision/external
#   navigation input.
#
# How you will likely use it:
#   Your VIO / SLAM / custom estimator publishes:
#     geometry_msgs/msg/PoseStamped
#   to:
#     /mavros/vision_pose/pose
#
# Design choice:
#   tf.listen = false
#   This means MAVROS listens to the topic directly instead of pulling a TF
#   transform.
#
# Use topic mode if:
#   - your estimator directly publishes PoseStamped
#   - you want simpler debugging
#
# Switch to TF mode only if your estimator naturally publishes map->base_link TF.
# -----------------------------------------------------------------------------
/mavros/vision_pose:
  ros__parameters:
    tf:
      # If false, MAVROS listens to the topic subscriber interface
      # (e.g. /mavros/vision_pose/pose).
      # If true, MAVROS ignores the topic subscriber and instead listens to TF.
      listen: false

      # Only used when tf.listen = true.
      # Parent frame MAVROS should look for.
      frame_id: "map"

      # Only used when tf.listen = true.
      # Child frame MAVROS should look for.
      child_frame_id: "vision_estimate"

      # Max TF polling / forwarding rate when TF mode is used.
      rate_limit: 30.0


# -----------------------------------------------------------------------------
# /mavros/setpoint_position
#
# Position setpoint interface used in GUIDED mode.
#
# Why keep this:
#   If you later command local position targets from ROS, this section controls
#   the interpretation of those setpoints.
#
# Key setting:
#   mav_frame: LOCAL_NED
#
# Why LOCAL_NED:
#   ArduPilot Guided commands and MAVLink local position targets are typically
#   interpreted in local NED space. MAVROS handles ENU<->NED conversion for ROS.
# -----------------------------------------------------------------------------
/mavros/setpoint_position:
  ros__parameters:
    tf:
      # If false, MAVROS listens to the topic subscriber interface.
      # This is usually what you want.
      listen: false

      # Only used for TF mode.
      frame_id: "map"
      child_frame_id: "target_position"

      # TF read/send limit [Hz] if TF mode is used.
      rate_limit: 50.0

    # MAVLink coordinate frame used for outbound position setpoints.
    # Keep LOCAL_NED for ArduPilot Guided local navigation.
    mav_frame: LOCAL_NED


# -----------------------------------------------------------------------------
# /mavros/setpoint_velocity
#
# Velocity setpoint interface used in GUIDED mode.
#
# Why keep this:
#   For real-time visual servoing / object following / reactive control, sending
#   velocity commands is often more practical than position targets.
#
# Example use:
#   Publish geometry_msgs/msg/TwistStamped to MAVROS velocity setpoint topic.
# -----------------------------------------------------------------------------
/mavros/setpoint_velocity:
  ros__parameters:
    # Use local NED for outgoing MAVLink velocity targets.
    mav_frame: LOCAL_NED


# -----------------------------------------------------------------------------
# /mavros/cmd
#
# Misc command behavior.
#
# Why keep this:
#   This is in the default apm config and is worth leaving explicit.
# -----------------------------------------------------------------------------
/mavros/cmd:
  ros__parameters:
    # Quirk for older FCUs. Default apm config uses false.
    use_comp_id_system_control: false


# -----------------------------------------------------------------------------
# /mavros/setpoint_attitude
#
# Optional but useful if you later experiment with attitude/thrust style control.
#
# Not required for normal external-pose GUIDED navigation.
# I include it here commented for reference only.
# -----------------------------------------------------------------------------
# /mavros/setpoint_attitude:
#   ros__parameters:
#     reverse_thrust: false
#     use_quaternion: false
#     tf:
#       listen: false
#       frame_id: "map"
#       child_frame_id: "target_attitude"
#       rate_limit: 50.0


# -----------------------------------------------------------------------------
# /mavros/guided_target
#
# Optional. The default apm config contains this.
# Usually not needed unless you know you are using that specific plugin path.
# Leaving it out keeps your config simpler.
# -----------------------------------------------------------------------------
# /mavros/guided_target:
#   ros__parameters:
#     tf:
#       listen: false
#       frame_id: "map"
#       child_frame_id: "target_position"
#       rate_limit: 50.0


# -----------------------------------------------------------------------------
# /mavros/fake_gps
#
# Do NOT enable this for your primary setup.
#
# Why:
#   Your intended architecture is ExternalNav / vision pose into EKF3,
#   not pretending your visual system is GPS.
#
# Keep fake_gps disabled unless you deliberately want GPS emulation.
# -----------------------------------------------------------------------------
# /mavros/fake_gps:
#   ros__parameters:
#     use_mocap: false
#     use_vision: false
#     use_hil_gps: false


# -----------------------------------------------------------------------------
# /mavros/vision_speed
#
# Optional.
# The stock apm_pluginlists.yaml deny-lists vision_speed_estimate by default.
#
# Do not add this unless:
#   - your estimator outputs trustworthy linear velocity, and
#   - you specifically want to feed that path through MAVROS, and
#   - you also remove it from the plugin denylist.
# -----------------------------------------------------------------------------
# /mavros/vision_speed:
#   ros__parameters:
#     listen_twist: true
#     twist_cov: true